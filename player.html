<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINK Player - Entre no Jogo</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Meta tags para evitar cache -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body class="player-body">
    <div class="player-container">
        <!-- Tela de Entrada -->
        <div id="joinScreen" class="player-screen active">
            <div class="player-logo">
                <h1 class="glitch-mini">KINK</h1>
                <p>is not Kahoot</p>
            </div>
            
            <div class="join-card">
                <h2>Entre na Sala</h2>
                <div class="code-input-group">
                    <input type="text" id="roomCodeInput" placeholder="Código da Sala" maxlength="6" autocomplete="off" inputmode="text">
                    <button id="checkRoomBtn" class="btn btn-primary">Verificar</button>
                </div>
            </div>
        </div>

        <!-- Tela de Perfil -->
        <div id="profileScreen" class="player-screen">
            <div class="profile-card">
                <h2>Escolha seu Perfil</h2>
                
                <div class="avatar-selector">
                    <h3>Escolha seu Avatar</h3>
                    <div class="avatars-grid" id="avatarsGrid"></div>
                </div>
                
                <div class="nickname-input">
                    <h3>Seu Nome</h3>
                    <input type="text" id="playerName" placeholder="Digite seu nome" maxlength="20" autocomplete="off">
                </div>
                
                <button id="joinGameBtn" class="btn btn-success btn-large">Entrar no Jogo!</button>
            </div>
        </div>

        <!-- Tela de Espera -->
        <div id="waitingScreen" class="player-screen">
            <div class="waiting-card">
                <div class="waiting-animation">
                    <div class="pulse"></div>
                </div>
                <h2>Aguardando o Professor</h2>
                <p>O jogo vai começar em breve...</p>
                <div class="room-info">
                    <span>Sala: <strong id="waitingRoomCode"></strong></span>
                </div>
                <div class="players-waiting">
                    <h3>Jogadores na Sala:</h3>
                    <div id="waitingPlayersList" class="players-list-mini"></div>
                </div>
            </div>
        </div>

        <!-- Tela de Leitura (criada dinamicamente pelo JS) -->
        <!-- Tela de Ranking Parcial (criada dinamicamente pelo JS) -->

        <!-- Tela de Pergunta -->
        <div id="questionScreen" class="player-screen">
            <div class="question-container">
                <div class="question-header">
                    <div class="question-timer">
                        <div class="timer-circle" id="timerCircle">
                            <span id="timerValue">30</span>
                        </div>
                    </div>
                    <div class="score-display">
                        Pontuação: <span id="currentScore">0</span>
                    </div>
                </div>
                
                <div class="question-card">
                    <h2 id="questionText">Carregando pergunta...</h2>
                </div>
                
                <div class="options-grid" id="optionsGrid"></div>
                
                <div class="feedback-message" id="feedbackMessage"></div>
            </div>
        </div>

        <!-- Tela de Ranking Final -->
        <div id="finalScreen" class="player-screen">
            <div class="final-card">
                <h2>🏆 Fim de Jogo! 🏆</h2>
                <div class="final-ranking">
                    <h3>Ranking Final</h3>
                    <div id="finalRankingList" class="ranking-list-large"></div>
                </div>
                <button id="exitGameBtn" class="btn btn-primary">Sair</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <!-- Socket.IO Client (servido pelo servidor) -->
    <script src="/socket.io/socket.io.js"></script>
    
    <!-- Scripts do projeto (ordem correta) -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/socket-client.js"></script>
    <script src="js/player-socket.js"></script>
    <script src="js/version-check.js"></script>
    
    <!-- Script de verificação de conexão -->
    <script>
        (function() {
            console.log('📄 Página player.html carregada');
            
            // Verificar conexão com o servidor
            let connectionChecked = false;
            const checkServerConnection = setInterval(() => {
                if (window.socketClient && window.socketClient.connected) {
                    console.log('✅ Conectado ao servidor Socket.IO');
                    clearInterval(checkServerConnection);
                    connectionChecked = true;
                }
            }, 500);
            
            // Timeout de conexão
            setTimeout(() => {
                if (!connectionChecked && (!window.socketClient || !window.socketClient.connected)) {
                    console.warn('⚠️ Não foi possível conectar ao servidor');
                    const connectionMsg = document.createElement('div');
                    connectionMsg.className = 'connection-warning';
                    connectionMsg.innerHTML = `
                        <div class="connection-warning-content">
                            <span>⚠️</span>
                            <span>Conectando ao servidor...</span>
                            <span class="connection-spinner"></span>
                        </div>
                    `;
                    document.body.appendChild(connectionMsg);
                    setTimeout(() => connectionMsg.remove(), 5000);
                }
            }, 3000);
        })();
    </script>
</body>
</html>
