<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/pwa.css">
    <meta name="theme-color" content="#ff6b6b">
    <link rel="icon" type="image/png" sizes="32x32" href="images/icons/icon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/icons/icon-16.png">
    <link rel="apple-touch-icon" href="images/icons/icon-180.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KINK">
    <title>Painel Admin - KINK is not Kahoot</title>
    <link rel="stylesheet" href="css/style.css">
    <script>document.documentElement.classList.add('js-anim');</script>
    <link rel="stylesheet" href="css/landing-fx.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/music-player.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <a href="#main-content" class="skip-link">Pular para o conteúdo</a>

    <!-- Camadas decorativas "cloud & data" (puramente visuais) -->
    <div class="aurora" aria-hidden="true">
        <div class="aurora-blob blob-coral"></div>
        <div class="aurora-blob blob-teal"></div>
        <div class="aurora-blob blob-blue"></div>
    </div>
    <div class="tech-grid" aria-hidden="true"></div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2 class="glitch-mini">KINK</h2>
                <span>is not Kahoot</span>
            </div>
            <button class="nav-toggle" id="navToggle" type="button" aria-expanded="false" aria-controls="navMenu" aria-label="Abrir menu">
                <span class="nav-toggle-bar"></span>
                <span class="nav-toggle-bar"></span>
                <span class="nav-toggle-bar"></span>
            </button>
            <div class="nav-menu" id="navMenu">
                <a href="my-quizzes.html" class="nav-link">Meus Quizzes</a>
                <a href="create-quiz.html" class="nav-link">Criar Quiz</a>
                <a href="simulados.html" class="nav-link">Simulados AWS</a>
                <a href="trilha.html" class="nav-link">Trilha de Estudos</a>
                <a href="historico.html" class="nav-link">Histórico</a>
                <button id="logoutBtn" class="btn-logout">Sair</button>
            </div>
            <div class="user-info">
                <span id="userName" style="display: none;"></span>
                <div class="user-avatar" style="display: none;"></div>
            </div>
        </div>
    </nav>

    <div class="container" id="main-content">
        <div class="page-header">
            <h1>🔐 Painel Admin</h1>
            <p>Reports de perguntas com possível erro, enviados pelos usuários nos simulados</p>
        </div>

        <div id="adminLoadingScreen" class="admin-screen active">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Verificando acesso...</p>
            </div>
        </div>

        <div id="adminDeniedScreen" class="admin-screen">
            <div class="empty-state">
                <div class="empty-icon">🚫</div>
                <h3>Acesso restrito</h3>
                <p>Esta página é restrita ao administrador do projeto.</p>
            </div>
        </div>

        <div id="adminReportsScreen" class="admin-screen">
            <div class="admin-toolbar">
                <div class="admin-filter-group" role="group" aria-label="Filtrar reports por status">
                    <button type="button" class="admin-filter-btn active" data-filter="open">🚩 Abertos</button>
                    <button type="button" class="admin-filter-btn" data-filter="resolved">✅ Resolvidos</button>
                    <button type="button" class="admin-filter-btn" data-filter="all">📋 Todos</button>
                </div>
                <button id="adminRefreshBtn" class="btn btn-outline btn-small">🔄 Atualizar</button>
            </div>

            <div id="adminReportsList" class="admin-reports-list"></div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <!-- Scripts do projeto -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/admin.js"></script>

    <!-- Music Player -->
    <script src="js/music-player.js"></script>

    <!-- Version Control -->
    <script src="js/version-check.js"></script>

    <!-- Visual FX (fundo animado cloud/data + scroll reveal) -->
    <script src="js/landing-fx.js" defer></script>
    <script src="js/pwa.js" defer></script>
    <script src="js/nav-menu.js" defer></script>
</body>
</html>
