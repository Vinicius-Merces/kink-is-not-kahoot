<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff6b6b">
    <link rel="icon" type="image/png" sizes="32x32" href="images/icons/icon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/icons/icon-16.png">
    <link rel="apple-touch-icon" href="images/icons/icon-180.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KINK">
    <title>Meus Quizzes - KINK is not Kahoot</title>
    <link rel="stylesheet" href="css/style.css">
    <script>document.documentElement.classList.add('js-anim');</script>
    <link rel="stylesheet" href="css/landing-fx.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/quiz-cards.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/music-player.css">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <a href="#main-content" class="skip-link">Pular para o conteúdo</a>

    <!-- Camadas decorativas "cloud & data" (puramente visuais) -->
    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <div class="aurora" aria-hidden="true">
        <div class="aurora-blob blob-coral"></div>
        <div class="aurora-blob blob-teal"></div>
        <div class="aurora-blob blob-blue"></div>
    </div>
    <div class="tech-grid" aria-hidden="true"></div>
    <div class="floating-icons" aria-hidden="true">
        <span class="float-icon icon-1">☁️</span>
        <span class="float-icon icon-2">🗄️</span>
        <span class="float-icon icon-3">🌐</span>
        <span class="float-icon icon-4">📊</span>
        <span class="float-icon icon-5">🔗</span>
        <span class="float-icon icon-6">⚙️</span>
    </div>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2 class="glitch-mini">KINK</h2>
                <span>is not Kahoot</span>
            </div>
            <div class="nav-menu">
                <a href="my-quizzes.html" class="nav-link active" aria-current="page">Meus Quizzes</a>
                <a href="create-quiz.html" class="nav-link">Criar Quiz</a>
                <a href="simulados.html" class="nav-link">Simulados AWS</a>
                <a href="trilha.html" class="nav-link">Trilha de Estudos</a>
                <a href="historico.html" class="nav-link">Histórico</a>
                <button id="logoutBtn" class="btn-logout">Sair</button>
            </div>
            <div class="user-info">
                <span id="userName" style="display: none;"></span>
                <div class="user-avatar" style="display: none;"></div>
            </div>
        </div>
    </nav>

    <div class="container" id="main-content">
        <div class="page-header">
            <h1>Meus Quizzes</h1>
            <p>Gerencie todos os seus quizzes criados</p>
            <button id="createNewQuiz" class="btn btn-primary">+ Criar Novo Quiz</button>
        </div>

        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-info">
                    <h3 id="totalQuizzes">0</h3>
                    <p>Total de Quizzes</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-info">
                    <h3 id="totalQuestions">0</h3>
                    <p>Perguntas no Total</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-info">
                    <h3 id="totalPlays">0</h3>
                    <p>Vezes Jogado</p>
                </div>
            </div>
        </div>

        <div class="quizzes-grid" id="quizzesGrid">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Carregando seus quizzes...</p>
            </div>
        </div>
    </div>

    <!-- Modal de Confirmação -->
    <div id="confirmModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="confirmModalTitle">
        <div class="modal-content">
            <h2 id="confirmModalTitle">Confirmar Ação</h2>
            <p id="confirmMessage"></p>
            <div class="modal-buttons">
                <button id="confirmYes" class="btn btn-danger">Sim</button>
                <button id="confirmNo" class="btn btn-outline">Não</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <!-- Socket.IO Client (servido pelo servidor) -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- Scripts do projeto (ordem corrigida) -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/socket-client.js"></script>
    <script src="js/quiz-manager.js"></script>
    <script src="js/music-player.js"></script>
    <script src="js/version-check.js"></script>

    <!-- Visual FX (fundo animado cloud/data + scroll reveal) -->
    <script src="js/landing-fx.js" defer></script>

    <script>
        (function() {
            console.log('📄 Página my-quizzes.html carregada');
            setTimeout(() => {
                if (window.socketClient && window.socketClient.connected) {
                    console.log('✅ Socket.IO conectado para criação de salas');
                } else {
                    console.warn('⚠️ Socket.IO não conectado, usando modo offline');
                }
            }, 2000);
        })();
    </script>
    <script src="js/pwa.js" defer></script>
</body>
</html>
