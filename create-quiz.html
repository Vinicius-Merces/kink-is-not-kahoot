<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Quiz - KINK is not Kahoot</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2 class="glitch-mini">KINK</h2>
                <span>is not Kahoot</span>
            </div>
            <div class="nav-menu">
                <a href="my-quizzes.html" class="nav-link">Meus Quizzes</a>
                <a href="create-quiz.html" class="nav-link active">Criar Quiz</a>
                <button id="logoutBtn" class="btn-logout">Sair</button>
            </div>
            <div class="user-info">
                <span id="userName" style="display: none;"></span>
                <div class="user-avatar" style="display: none;"></div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Criar Novo Quiz</h1>
            <p>Sem limites de caracteres. Sem restrições. Apenas sua criatividade.</p>
        </div>

        <div class="quiz-creator">
            <div class="quiz-info-section">
                <div class="form-card">
                    <h3>Informações do Quiz</h3>
                    <input type="text" id="quizTitle" placeholder="Título do Quiz *" maxlength="200" required>
                    <textarea id="quizDescription" placeholder="Descrição do Quiz (opcional)" rows="3"></textarea>
                    <div class="form-row">
                        <div class="form-check">
                            <input type="checkbox" id="randomizeQuestions">
                            <label>Randomizar ordem das perguntas</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" id="showCorrectAnswer" checked>
                            <label>Mostrar resposta correta após cada pergunta</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="questions-section">
                <div class="questions-header">
                    <h3>Perguntas</h3>
                    <button id="addQuestionBtn" class="btn btn-success">+ Adicionar Pergunta</button>
                </div>
                
                <div id="questionsList" class="questions-list">
                    <div class="empty-questions">
                        <p>🎯 Nenhuma pergunta adicionada ainda</p>
                        <p>Clique no botão acima para começar a criar seu quiz</p>
                    </div>
                </div>
            </div>

            <div class="quiz-actions" style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
                <button id="saveQuizBtn" class="btn btn-primary btn-large">💾 Salvar Quiz</button>
                <button id="cancelBtn" class="btn btn-outline btn-large">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal para Criar/Editar Pergunta -->
    <div id="questionModal" class="modal">
        <div class="modal-content modal-large">
            <span class="close">&times;</span>
            <h2 id="modalTitle">Nova Pergunta</h2>
            <form id="questionForm">
                <div class="form-group">
                    <label>Pergunta *</label>
                    <textarea id="questionText" rows="3" placeholder="Digite sua pergunta aqui..." required></textarea>
                    <small>Sem limite de caracteres</small>
                </div>
                
                <div class="form-group">
                    <label>Tempo Limite (segundos)</label>
                    <input type="number" id="timeLimit" value="30" min="5" max="120">
                </div>
                
                <div class="options-group">
                    <label>Opções de Resposta *</label>
                    <div id="optionsList">
                        <!-- 4 opções padrão serão geradas via JS -->
                    </div>
                    <button type="button" id="addOptionBtn" class="btn-small">+ Adicionar Opção</button>
                </div>
                
                <div class="modal-buttons">
                    <button type="submit" class="btn btn-primary">Salvar Pergunta</button>
                    <button type="button" id="cancelQuestionBtn" class="btn btn-outline">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/create-quiz.js"></script>

        <!-- Music Player -->
    <link rel="stylesheet" href="css/player.css">
    <script src="js/music-player.js"></script>
    
</body>
</html>
